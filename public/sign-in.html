<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — SOLLENE</title>
  <meta name="description" content="Sign in to your SOLLENE account.">
  <link rel="canonical" href="https://sollene.site/sign-in">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <a href="/" class="auth-logo">SOLLENE</a>
      <div class="auth-card">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your SOLLENE account</p>
        <div id="clerk-sign-in"></div>
        <p class="auth-footer-text">Don't have an account? <a href="/sign-up">Create one</a></p>
      </div>
    </div>
  </div>
  <script
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@4/dist/clerk.browser.js"
    data-clerk-publishable-key="pk_live_Y2xlcmsuc29sbGVuZS5zaXRlJA"
    crossorigin="anonymous"
  ></script>
  <script>
    async function initClerk() {
      if (!window.Clerk) return;
      await window.Clerk.load();

      const el = document.getElementById('clerk-sign-in');
      if (el) {
        window.Clerk.mountSignIn(el, {
          signUpUrl: '/sign-up',
          afterSignInUrl: '/account',
          appearance: {
            variables: {
              colorPrimary: '#000000',
              colorTextOnPrimaryBackground: '#ffffff',
              fontFamily: 'Inter, sans-serif',
              borderRadius: '8px',
            }
          }
        });
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initClerk);
    } else {
      initClerk();
    }
  </script>
</body>
</html>
