<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order — SOLLENE</title>
  <meta name="description" content="Track your SOLLENE order in real-time.">
  <link rel="canonical" href="https://sollene.site/track-order">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .track-page { padding: 40px 0; max-width: 560px; margin: 0 auto; }
    .track-timeline { position: relative; padding-left: 32px; margin: 32px 0; }
    .track-timeline::before { content: ''; position: absolute; left: 11px; top: 0; bottom: 0; width: 2px; background: var(--color-gray-200); }
    .track-event { position: relative; padding-bottom: 24px; }
    .track-event::before { content: ''; position: absolute; left: -24px; top: 4px; width: 12px; height: 12px; border-radius: 50%; background: var(--color-gray-200); }
    .track-event.done::before { background: #059669; }
    .track-event.active::before { background: var(--color-black); box-shadow: 0 0 0 3px rgba(0,0,0,0.15); }
    .track-event-title { font-weight: 600; font-size: 0.9rem; }
    .track-event-date { font-size: 0.8rem; color: var(--color-gray-400); }
  </style>
</head>
<body>
  <header class="header" id="header"><div class="header-inner"><a href="/" class="logo">SOLLENE</a><nav class="nav"><ul class="nav-list"><li><a href="/" class="nav-link">Home</a></li><li><a href="/shop" class="nav-link">Shop</a></li><li><a href="/categories" class="nav-link">Categories</a></li><li><a href="/contact" class="nav-link">Contact</a></li></ul></nav><div class="header-actions"><button class="header-icon cart-icon" id="cartToggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="badge cart-badge" id="cartBadge">0</span></button></div></div></header>
  <main class="container track-page">
    <h1 style="font-family:var(--font-display);font-size:1.5rem;text-align:center;margin-bottom:24px">Track Your Order</h1>
    <form id="trackForm" style="display:flex;gap:8px;margin-bottom:32px">
      <input class="form-input" id="trackInput" placeholder="Enter order ID or payment reference" required style="flex:1">
      <button class="btn btn-primary">Track</button>
    </form>
    <div id="trackResult"></div>
  </main>
  <script>
    document.getElementById('trackForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const val = document.getElementById('trackInput').value.trim();
      const el = document.getElementById('trackResult');
      el.innerHTML = '<p style="color:var(--color-gray-400)">Searching...</p>';
      try {
        let order;
        const byRef = await fetch(`/api/orders/ref/${encodeURIComponent(val)}`);
        if (byRef.ok) { const d = await byRef.json(); if (d.success) order = d.data; }
        if (!order) { const byId = await fetch(`/api/orders/track/${encodeURIComponent(val)}`); if (byId.ok) { const d = await byId.json(); if (d.success) order = d.data; } }
        if (!order) { el.innerHTML = '<div style="padding:20px;background:#fee2e2;color:#dc2626;font-size:0.9rem">Order not found. Check your order ID or payment reference.</div>'; return; }
        const statuses = ['Pending','Paid','Processing','Shipped','Delivered'];
        const idx = statuses.indexOf(order.status);
        el.innerHTML = `<div style="padding:16px;border:1px solid var(--color-gray-100);margin-bottom:24px"><div style="font-size:0.8rem;color:var(--color-gray-400)">Order #${order._id.slice(-8).toUpperCase()}</div><div><span class="account-order-status status-${order.status}">${order.status}</span></div>${order.trackingNumber ? '<div style="font-size:0.85rem;margin-top:8px">Tracking: <strong>'+order.trackingNumber+'</strong></div>' : ''}</div>
        <div class="track-timeline">${statuses.map((s,i) => `<div class="track-event ${i < idx ? 'done' : ''} ${i === idx ? 'active' : ''}"><div class="track-event-title">${s}</div><div class="track-event-date">${i <= idx ? new Date().toLocaleDateString() : ''}</div></div>`).join('')}</div>`;
      } catch (err) { el.innerHTML = '<div style="padding:20px;background:#fee2e2;color:#dc2626;font-size:0.9rem">Error looking up order. Please try again.</div>'; }
    });
  </script>
  <script src="/js/main.js"></script>
</body>
</html>
