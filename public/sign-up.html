<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — SOLLENE</title>
  <meta name="description" content="Create your SOLLENE account.">
  <link rel="canonical" href="https://sollene.site/sign-up">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <a href="/" class="auth-logo">SOLLENE</a>
      <div class="auth-card">
        <h1 class="auth-title">Create your account</h1>
        <p class="auth-subtitle">Join SOLLENE and start shopping</p>
        <div id="clerk-sign-up"></div>
        <p class="auth-footer-text">Already have an account? <a href="/sign-in">Sign in</a></p>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@4/dist/clerk.browser.js"></script>
  <script>
    const PUBLISHABLE_KEY = 'pk_live_Y2xlcmsuc29sbGVuZS5zaXRlJA';

    async function initClerk() {
      if (typeof Clerk === 'undefined') return;
      const clerk = new Clerk(PUBLISHABLE_KEY);
      await clerk.load();

      const el = document.getElementById('clerk-sign-up');
      if (el) {
        clerk.mountSignUp(el, {
          signInUrl: '/sign-in',
          afterSignUpUrl: '/account',
          appearance: {
            variables: {
              colorPrimary: '#000000',
              colorTextOnPrimaryBackground: '#ffffff',
              fontFamily: 'Inter, sans-serif',
              borderRadius: '8px',
            }
          }
        });
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initClerk);
    } else {
      initClerk();
    }
  </script>
</body>
</html>
