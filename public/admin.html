<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLLENE</title>
<link rel="canonical" href="https://sollene.site/admin">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
.admin-page{background:var(--color-gray-50)}
.admin-layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - var(--header-height));margin-top:24px}
@media(max-width:768px){.admin-layout{grid-template-columns:1fr}}
.admin-sidebar{background:var(--color-white);border-right:1px solid var(--color-gray-100);padding:24px 0}
@media(max-width:768px){.admin-sidebar{display:none}}
.admin-logo{display:block;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--color-gray-400);padding:0 24px;margin-bottom:20px}
.admin-nav{display:flex;flex-direction:column}
.admin-nav-item{display:flex;align-items:center;gap:10px;padding:10px 24px;font-size:0.85rem;font-weight:500;color:var(--color-gray-500);cursor:pointer;transition:var(--transition-fast);border-left:2px solid transparent}
.admin-nav-item:hover{color:var(--color-black);background:var(--color-gray-50)}
.admin-nav-item.active{color:var(--color-black);border-left-color:var(--color-black);background:var(--color-gray-50)}
.admin-main{padding:32px 40px}
@media(max-width:768px){.admin-main{padding:24px 16px}}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.admin-header h1{font-family:var(--font-display);font-size:1.5rem;font-weight:600}
.admin-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.admin-stat-card{background:var(--color-white);padding:24px;border:1px solid var(--color-gray-100)}
.admin-stat-label{font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--color-gray-400);margin-bottom:8px}
.admin-stat-value{font-size:1.8rem;font-weight:700;color:var(--color-black)}
.admin-stat-change{font-size:0.8rem;color:var(--color-gray-400);margin-top:4px}
.admin-card{background:var(--color-white);border:1px solid var(--color-gray-100);margin-bottom:24px}
.admin-card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--color-gray-100)}
.admin-card-title{font-size:0.85rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.admin-card-body{padding:20px}
.admin-table{width:100%;border-collapse:collapse;font-size:0.85rem}
.admin-table th{text-align:left;padding:10px 12px;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--color-gray-400);border-bottom:1px solid var(--color-gray-100)}
.admin-table td{padding:12px;border-bottom:1px solid var(--color-gray-50);vertical-align:middle}
.admin-table tr:hover td{background:var(--color-gray-50)}
.admin-badge{display:inline-block;padding:2px 10px;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.admin-badge.success{background:#d1fae5;color:#065f46}
.admin-badge.warning{background:#fef3c7;color:#92400e}
.admin-badge.danger{background:#fee2e2;color:#991b1b}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:0.8rem;font-weight:500;color:var(--color-gray-600)}
.form-input{padding:10px 12px;border:1px solid var(--color-gray-200);font-size:0.9rem;transition:var(--transition-fast);background:var(--color-white);color:var(--color-black);width:100%}
.form-input:focus{border-color:var(--color-black);outline:none}
.form-input::placeholder{color:var(--color-gray-300)}
select.form-input{cursor:pointer}
textarea.form-input{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:600px){.form-row-3{grid-template-columns:1fr}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{display:flex}
.modal{background:var(--color-white);width:100%;max-width:600px;max-height:80vh;overflow-y:auto;padding:32px}
.modal h2{font-family:var(--font-display);font-size:1.2rem;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--color-gray-100)}
.modal-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--color-gray-100)}
.btn-xs{padding:6px 12px;font-size:0.75rem}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 24px;background:var(--color-black);color:var(--color-white);font-size:0.85rem;z-index:2000;opacity:0;transition:var(--transition-base);pointer-events:none}
.toast.show{opacity:1}
.empty-state{padding:40px 0;text-align:center;color:var(--color-gray-400);font-size:0.9rem}
#adminAuth,#adminApp,#notFoundPage{display:none}
.auth-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#fff}
.auth-card{text-align:center;padding:48px 32px;max-width:400px;width:100%}
.auth-logo{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:700;color:#000;margin-bottom:12px;letter-spacing:-0.5px}
.auth-subtitle{color:#666;margin-bottom:32px;font-size:0.9rem;letter-spacing:0.3px}
.auth-input{width:100%;padding:14px 16px;border:1px solid #e5e5e5;font-size:0.95rem;background:#fff;color:#000;outline:none;transition:border-color 200ms}
.auth-input:focus{border-color:#000}
.auth-input::placeholder{color:#bbb}
.auth-btn{width:100%;padding:14px;background:#000;color:#fff;border:none;font-size:0.85rem;font-weight:600;letter-spacing:1px;cursor:pointer;transition:opacity 200ms;text-transform:uppercase}
.auth-btn:hover{opacity:0.85}
.auth-error{color:#dc2626;font-size:0.8rem;margin-top:12px;display:none}
.not-found-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#fff}
.not-found-inner{text-align:center}
.not-found-inner h1{font-family:'Playfair Display',serif;font-size:6rem;font-weight:700;color:#000;margin:0;line-height:1}
.not-found-inner p{font-size:1rem;color:#666;margin-top:16px;letter-spacing:0.5px}
.mobile-nav-select{display:none;width:100%;padding:12px 16px;border:1px solid var(--color-gray-200);font-size:0.9rem;margin-bottom:20px;background:var(--color-white)}
@media(max-width:768px){.mobile-nav-select{display:block}}
.variant-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--color-gray-50);font-size:0.8rem}
.image-preview{width:36px;height:36px;background:var(--color-gray-50);overflow:hidden;border-radius:4px;flex-shrink:0}
.image-preview img{width:100%;height:100%;object-fit:cover}
.login-error-msg{color:#dc2626;font-size:0.8rem;margin-top:12px;display:none}
</style>
</head>
<body class="admin-page">
<header class="header" id="header">
  <div class="header-inner">
    <a href="/admin" class="logo" style="font-size:0.95rem">SOLLENE · Admin</a>
    <nav class="nav">
      <ul class="nav-list">
        <li><a href="/" class="nav-link">Back to Store</a></li>
      </ul>
    </nav>
    <div class="header-actions">
      <button class="header-icon" id="signOutBtn" title="Sign out" style="display:none">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<div id="adminAuth" class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">SOLLENE</div>
    <p class="auth-subtitle">Sign in to manage your store</p>
    <form id="loginForm">
      <input type="password" class="auth-input" id="passwordInput" placeholder="Password" autocomplete="current-password" required>
      <div class="login-error-msg" id="loginError"></div>
      <button type="submit" class="auth-btn" id="loginBtn" style="margin-top:16px">Sign In</button>
    </form>
  </div>
</div>

<div id="adminApp">
  <div class="container">
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <span class="admin-logo">Panel</span>
        <nav class="admin-nav">
          <div class="admin-nav-item active" data-section="dashboard">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> Dashboard
          </div>
          <div class="admin-nav-item" data-section="products">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg> Products
          </div>
          <div class="admin-nav-item" data-section="categories">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> Categories
          </div>
        </nav>
      </aside>
      <main class="admin-main" id="adminMain">
        <p style="color:var(--color-gray-400)">Loading...</p>
      </main>
    </div>
  </div>
</div>

<div id="notFoundPage" class="not-found-page">
  <div class="not-found-inner">
    <h1>404</h1>
    <p>Page Not Found</p>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
<div class="toast" id="toast"></div>

<select class="mobile-nav-select" id="mobileNav">
  <option value="dashboard">Dashboard</option>
  <option value="products">Products</option>
  <option value="categories">Categories</option>
</select>

<script>
const ADMIN_CONFIGURED = '{{ADMIN_CONFIGURED}}';
const API = '/api/admin';
let currentSection = 'dashboard';
let categories = [];

function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function imgUrl(img) {
  if (!img) return '';
  const raw = img.url || img;
  return String(raw).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function formatPrice(val) {
  if (val == null || isNaN(val)) return '—';
  return '₦' + Number(val).toLocaleString();
}

function showView(view) {
  document.getElementById('adminAuth').style.display = view === 'auth' ? 'flex' : 'none';
  document.getElementById('adminApp').style.display = view === 'app' ? 'block' : 'none';
  document.getElementById('notFoundPage').style.display = view === '404' ? 'flex' : 'none';
  const signOutBtn = document.getElementById('signOutBtn');
  if (signOutBtn) signOutBtn.style.display = view === 'app' ? 'flex' : 'none';
}

async function fetchWithTimeout(url, opts, timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, { signal: controller.signal, ...opts });
    return res;
  } finally {
    clearTimeout(timer);
  }
}

async function apiFetch(url, opts = {}) {
  opts.headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  try {
    const res = await fetchWithTimeout(url, opts, 15000);
    return await res.json();
  } catch (err) {
    if (err.name === 'AbortError') return { success: false, message: 'Request timed out' };
    return { success: false, message: `Request failed (${err.message})` };
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function switchSection(section) {
  currentSection = section;
  document.querySelectorAll('.admin-nav-item').forEach(e => e.classList.toggle('active', e.dataset.section === section));
  document.getElementById('mobileNav').value = section;
  loadSection(section);
}

async function loadSection(section) {
  const m = document.getElementById('adminMain');
  m.innerHTML = '<p style="color:var(--color-gray-400)">Loading...</p>';
  if (section === 'dashboard') await renderDashboard(m);
  else if (section === 'products') { await fetchCategories(); await renderProducts(m); }
  else if (section === 'categories') await renderCategories(m);
}

async function fetchCategories() {
  try {
    const r = await fetchWithTimeout(API + '/categories', {}, 15000);
    const d = await r.json();
    categories = d.data || [];
  } catch {
    categories = [];
  }
}

async function renderDashboard(el) {
  const d = await apiFetch(API + '/dashboard');
  if (!d.success) { el.innerHTML = '<p class="empty-state">Could not load dashboard.</p>'; return; }
  let html = `<div class="admin-header">
    <h1>Dashboard</h1>
    <span style="font-size:0.85rem;color:var(--color-gray-400)">${new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</span>
  </div>`;
  const s = d.data;
  html += `<div class="admin-stats">
    <div class="admin-stat-card">
      <div class="admin-stat-label">Total Products</div>
      <div class="admin-stat-value">${s.totalProducts || 0}</div>
    </div>
    <div class="admin-stat-card">
      <div class="admin-stat-label">Categories</div>
      <div class="admin-stat-value">${s.totalCategories || 0}</div>
    </div>
  </div>`;
  html += `<div class="admin-card">
    <div class="admin-card-header">
      <div class="admin-card-title">Quick Actions</div>
    </div>
    <div class="admin-card-body" style="display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick="switchSection('products');setTimeout(()=>productForm(),100)">+ Add Product</button>
      <button class="btn btn-outline btn-sm" onclick="switchSection('categories');setTimeout(()=>categoryForm(),100)">+ Add Category</button>
    </div>
  </div>
  <div class="admin-card">
    <div class="admin-card-header">
      <div class="admin-card-title">Recent Products</div>
    </div>
    <div class="admin-card-body" id="dashProducts"><p style="color:var(--color-gray-400);font-size:0.85rem">Loading...</p></div>
  </div>`;
  el.innerHTML = html;

  const r = await apiFetch(API + '/products?limit=5');
  if (r.success && r.data?.length) {
    let t = '<table class="admin-table"><tr><th></th><th>Name</th><th>Price</th><th>Stock</th></tr>';
    r.data.forEach(p => {
      t += `<tr><td>${p.images?.[0] ? '<div class="image-preview"><img src="' + imgUrl(p.images[0]) + '" onerror="this.style.display=\'none\'"></div>' : ''}</td>
        <td style="font-weight:500">${escapeHtml(p.name)}</td>
        <td>${formatPrice(p.price)}</td>
        <td style="color:${p.stock <= 5 ? '#dc2626' : 'inherit'}">${p.stock ?? '—'}</td></tr>`;
    });
    t += '</table>';
    document.getElementById('dashProducts').innerHTML = t;
  } else {
    document.getElementById('dashProducts').innerHTML = '<p style="color:var(--color-gray-400);font-size:0.85rem">No products yet.</p>';
  }
}

async function renderProducts(el) {
  let html = `<div class="admin-header">
    <h1>Products</h1>
    <button class="btn btn-primary btn-sm" onclick="productForm()">+ Add Product</button>
  </div>`;
  const d = await apiFetch(API + '/products?limit=100');
  if (d.success && d.data?.length) {
    let t = '<div style="overflow-x:auto"><table class="admin-table">';
    t += '<tr><th></th><th>Name</th><th>Price</th><th>Stock</th><th>Category</th><th>Featured</th><th></th></tr>';
    d.data.forEach(p => {
      const img = p.images?.[0] ? `<div class="image-preview"><img src="${imgUrl(p.images[0])}" onerror="this.style.display='none'"></div>` : '';
      t += `<tr>
        <td>${img}</td>
        <td style="font-weight:500">${escapeHtml(p.name)}</td>
        <td>${formatPrice(p.price)}</td>
        <td style="color:${p.stock <= 5 ? '#dc2626' : 'inherit'}">${p.stock ?? '—'}</td>
        <td style="font-size:0.8rem">${escapeHtml(p.category?.name) || '—'}</td>
        <td>${p.isFeatured ? '✓' : ''}</td>
        <td>
          <button class="btn btn-outline btn-xs" onclick="productForm('${String(p._id).replace(/'/g, "\\'")}')">Edit</button>
          <button class="btn btn-outline btn-xs" style="color:#dc2626" onclick="deleteProduct('${String(p._id).replace(/'/g, "\\'")}','${escapeHtml(p.name).replace(/'/g, "\\'").replace(/"/g, '&quot;')}')">Del</button>
        </td>
      </tr>`;
    });
    t += '</table></div>';
    el.innerHTML = html + t;
  } else {
    el.innerHTML = html + '<p class="empty-state">No products found. Click "+ Add Product" to create one.</p>';
  }
}

let pVariants = [];
let pImages = [];

function renderImageList() {
  const el = document.getElementById('pImageList');
  if (!el) return;
  if (!pImages.length) { el.innerHTML = '<p style="color:var(--color-gray-400);font-size:0.8rem">No images uploaded.</p>'; return; }
  el.innerHTML = pImages.map((img, i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--color-gray-50)">
      <div class="image-preview"><img src="${img.url}" onerror="this.style.display='none'"></div>
      <span style="flex:1;font-size:0.75rem;color:var(--color-gray-500);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${img.publicId || img.url}</span>
      <button type="button" class="btn btn-outline btn-xs" style="color:#dc2626" onclick="removeProductImage(${i})">×</button>
    </div>
  `).join('');
}

async function uploadProductImage(file) {
  const formData = new FormData();
  formData.append('image', file);
  try {
    const res = await fetchWithTimeout(API + '/upload', { method: 'POST', body: formData }, 30000);
    const data = await res.json();
    if (data.success) {
      pImages.push(data.data);
      renderImageList();
    } else {
      toast('Upload failed');
    }
  } catch {
    toast('Upload error');
  }
}

async function removeProductImage(index) {
  const img = pImages[index];
  if (img && img.publicId) {
    const r = await apiFetch(API + '/remove-image', { method: 'POST', body: JSON.stringify({ publicId: img.publicId }) });
    if (!r.success) { toast('Failed to remove image from server'); return; }
  }
  pImages.splice(index, 1);
  renderImageList();
}

function productForm(id) {
  pVariants = [];
  pImages = [];
  const isEdit = !!id;
  const catOpts = categories.length ? categories.map(c => '<option value="' + c._id + '">' + escapeHtml(c.name) + '</option>').join('') : '<option value="">No categories — create one first</option>';
  openModal(`<h2>${isEdit ? 'Edit' : 'Add'} Product</h2>
    <form id="productForm" style="display:flex;flex-direction:column;gap:12px">
      <div class="form-row">
        <div class="form-group"><label>Name</label><input class="form-input" id="pName" required></div>
        <div class="form-group"><label>Slug</label><input class="form-input" id="pSlug" placeholder="auto-generate"></div>
      </div>
      <div class="form-group"><label>Description</label><textarea class="form-input" id="pDesc" rows="3"></textarea></div>
      <div class="form-row-3">
        <div class="form-group"><label>Price (₦)</label><input class="form-input" id="pPrice" type="number" required></div>
        <div class="form-group"><label>Compare Price</label><input class="form-input" id="pCompare" type="number"></div>
        <div class="form-group"><label>Stock</label><input class="form-input" id="pStock" type="number" value="0"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Category</label><select class="form-input" id="pCategory">${catOpts}</select></div>
        <div class="form-group"><label>SKU</label><input class="form-input" id="pSku"></div>
      </div>
      <div style="border:1px solid var(--color-gray-100);padding:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <strong style="font-size:0.85rem">Images</strong>
          <label class="btn btn-outline btn-xs" style="cursor:pointer">+ Upload<input type="file" id="pImageInput" accept="image/jpeg,image/jpg,image/png,image/webp" style="display:none" onchange="handleImageUpload(event)"></label>
        </div>
        <div id="pImageList" style="font-size:0.85rem"><p style="color:var(--color-gray-400);font-size:0.8rem">No images uploaded.</p></div>
      </div>
      <div style="display:flex;gap:16px;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:6px;font-size:0.85rem"><input type="checkbox" id="pFeatured"> Featured</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:0.85rem"><input type="checkbox" id="pBestSeller"> Best Seller</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:0.85rem"><input type="checkbox" id="pNewArrival"> New Arrival</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:0.85rem"><input type="checkbox" id="pIsActive" checked> Active</label>
      </div>
      <div style="border-top:1px solid var(--color-gray-100);padding-top:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <strong style="font-size:0.85rem">Variants</strong>
          <button type="button" class="btn btn-outline btn-xs" onclick="variantForm()">+ Add</button>
        </div>
        <div id="variantList" style="font-size:0.85rem"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">${isEdit ? 'Update' : 'Create'} Product</button>
      </div>
    </form>`);
  renderVariantList();
  renderImageList();

  if (isEdit) {
    apiFetch(API + '/products/' + id).then(r => {
      if (!r.success) { toast('Failed to load product'); closeModal(); return; }
      const p = r.data;
      document.getElementById('pName').value = p.name;
      document.getElementById('pSlug').value = p.slug || '';
      document.getElementById('pDesc').value = p.description || '';
      document.getElementById('pPrice').value = p.price;
      document.getElementById('pCompare').value = p.comparePrice || '';
      document.getElementById('pStock').value = p.stock ?? 0;
      document.getElementById('pSku').value = p.sku || '';
      document.getElementById('pFeatured').checked = !!p.isFeatured;
      document.getElementById('pBestSeller').checked = !!p.isBestSeller;
      document.getElementById('pNewArrival').checked = !!p.isNewArrival;
      const activeEl = document.getElementById('pIsActive');
      if (activeEl) activeEl.checked = p.isActive !== false;
      if (p.category) document.getElementById('pCategory').value = p.category._id || p.category;
      if (p.images) { pImages = p.images.map(img => ({ url: img.url || img, publicId: img.publicId || '' })); renderImageList(); }
      if (p.variants) { pVariants = p.variants; renderVariantList(); }
    });
  }

  document.getElementById('productForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!document.getElementById('pCategory').value) {
      toast('Please select a category'); return;
    }
    const body = {
      name: document.getElementById('pName').value,
      slug: document.getElementById('pSlug').value || undefined,
      description: document.getElementById('pDesc').value,
      price: Number(document.getElementById('pPrice').value),
      comparePrice: document.getElementById('pCompare').value ? Number(document.getElementById('pCompare').value) : undefined,
      stock: Number(document.getElementById('pStock').value),
      sku: document.getElementById('pSku').value,
      category: document.getElementById('pCategory').value,
      images: pImages,
      isFeatured: document.getElementById('pFeatured').checked,
      isBestSeller: document.getElementById('pBestSeller').checked,
      isNewArrival: document.getElementById('pNewArrival').checked,
      isActive: document.getElementById('pIsActive').checked,
      variants: pVariants,
    };
    const url = isEdit ? API + '/products/' + id : API + '/products';
    const method = isEdit ? 'PUT' : 'POST';
    const r = await apiFetch(url, { method, body: JSON.stringify(body) });
    if (r.success) { closeModal(); toast(isEdit ? 'Product updated' : 'Product created'); loadSection('products'); }
    else { toast(r.message || 'Error saving product'); }
  });
}

function handleImageUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  uploadProductImage(file);
  event.target.value = '';
}

function renderVariantList() {
  const el = document.getElementById('variantList');
  if (!el) return;
  if (!pVariants.length) { el.innerHTML = '<p style="color:var(--color-gray-400)">No variants.</p>'; return; }
  let t = '';
  pVariants.forEach((v, i) => {
    t += `<div class="variant-row">
      <span style="flex:1"><strong>${escapeHtml(v.name)}</strong>${v.sku ? ' · ' + escapeHtml(v.sku) : ''}</span>
      <span>${v.price != null && v.price !== '' ? '₦' + Number(v.price).toLocaleString() : '—'}</span>
      <span style="margin:0 12px">Stock: ${v.stock ?? 0}</span>
      <button type="button" class="btn btn-outline btn-xs" onclick="editVariant(${i})">Edit</button>
      <button type="button" class="btn btn-outline btn-xs" style="color:#dc2626" onclick="removeVariant(${i})">×</button>
    </div>`;
  });
  el.innerHTML = t;
}

function variantForm(index) {
  const isEdit = index !== undefined;
  const v = isEdit ? pVariants[index] : { name: '', sku: '', price: '', stock: 0 };
  openModal(`<h2>${isEdit ? 'Edit' : 'Add'} Variant</h2>
    <form id="variantForm" style="display:flex;flex-direction:column;gap:12px">
      <div class="form-group"><label>Variant Name</label><input class="form-input" id="vName" value="${escapeHtml(v.name)}" required placeholder="e.g. Small / Red"></div>
      <div class="form-row">
        <div class="form-group"><label>SKU</label><input class="form-input" id="vSku" value="${escapeHtml(v.sku || '')}"></div>
        <div class="form-group"><label>Price (override)</label><input class="form-input" id="vPrice" type="number" value="${v.price != null ? v.price : ''}"></div>
      </div>
      <div class="form-group"><label>Stock</label><input class="form-input" id="vStock" type="number" value="${v.stock ?? 0}"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">${isEdit ? 'Update' : 'Add'} Variant</button>
      </div>
    </form>`);
  document.getElementById('variantForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const variant = { name: document.getElementById('vName').value, sku: document.getElementById('vSku').value, price: Number(document.getElementById('vPrice').value) || undefined, stock: Number(document.getElementById('vStock').value) };
    if (isEdit) { pVariants[index] = variant; } else { pVariants.push(variant); }
    closeModal();
    renderVariantList();
  });
}

function editVariant(i) { variantForm(i); }
function removeVariant(i) { pVariants.splice(i, 1); renderVariantList(); }

async function deleteProduct(id, name) {
  if (!confirm('Delete "' + name.replace(/&quot;/g, '"').replace(/&#39;/g, "'") + '"?')) return;
  const r = await apiFetch(API + '/products/' + id, { method: 'DELETE' });
  if (r.success) { toast('Product deleted'); loadSection('products'); }
  else { toast(r.message || 'Error'); }
}

async function renderCategories(el) {
  let html = `<div class="admin-header">
    <h1>Categories</h1>
    <button class="btn btn-primary btn-sm" onclick="categoryForm()">+ Add Category</button>
  </div>`;
  const d = await apiFetch(API + '/categories');
  if (d.success && d.data?.length) {
    let t = '<div style="overflow-x:auto"><table class="admin-table">';
    t += '<tr><th>Name</th><th>Slug</th><th>Order</th><th>Active</th><th></th></tr>';
    d.data.forEach(c => {
      t += `<tr>
        <td style="font-weight:500">${escapeHtml(c.name)}</td>
        <td style="font-size:0.8rem">${escapeHtml(c.slug)}</td>
        <td>${c.order || 0}</td>
        <td>${c.isActive !== false ? '✓' : '✗'}</td>
        <td>
          <button class="btn btn-outline btn-xs" onclick="categoryForm('${String(c._id).replace(/'/g, "\\'")}')">Edit</button>
          <button class="btn btn-outline btn-xs" style="color:#dc2626" onclick="deleteCategory('${String(c._id).replace(/'/g, "\\'")}','${escapeHtml(c.name).replace(/'/g, "\\'").replace(/"/g, '&quot;')}')">Del</button>
        </td>
      </tr>`;
    });
    t += '</table></div>';
    el.innerHTML = html + t;
  } else {
    el.innerHTML = html + '<p class="empty-state">No categories found. Click "+ Add Category" to create one.</p>';
  }
}

function categoryForm(id) {
  const isEdit = !!id;
  openModal(`<h2>${isEdit ? 'Edit' : 'Add'} Category</h2>
    <form id="categoryForm" style="display:flex;flex-direction:column;gap:12px">
      <div class="form-row">
        <div class="form-group"><label>Name</label><input class="form-input" id="catName" required></div>
        <div class="form-group"><label>Slug</label><input class="form-input" id="catSlug" placeholder="auto"></div>
      </div>
      <div class="form-group"><label>Description</label><textarea class="form-input" id="catDesc" rows="2"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Image URL</label><input class="form-input" id="catImage" placeholder="https://..."></div>
        <div class="form-group"><label>Order</label><input class="form-input" id="catOrder" type="number" value="0"></div>
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:0.85rem"><input type="checkbox" id="catActive" checked> Active</label>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">${isEdit ? 'Update' : 'Create'} Category</button>
      </div>
    </form>`);
  if (isEdit) {
    apiFetch(API + '/categories/' + id).then(r => {
      if (!r.success) { toast('Failed to load category'); closeModal(); return; }
      const c = r.data;
      document.getElementById('catName').value = c.name;
      document.getElementById('catSlug').value = c.slug || '';
      document.getElementById('catDesc').value = c.description || '';
      document.getElementById('catImage').value = c.image || '';
      document.getElementById('catOrder').value = c.order || 0;
      document.getElementById('catActive').checked = c.isActive !== false;
    });
  }
  document.getElementById('categoryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!document.getElementById('catName').value.trim()) {
      toast('Category name is required'); return;
    }
    const body = {
      name: document.getElementById('catName').value,
      slug: document.getElementById('catSlug').value || undefined,
      description: document.getElementById('catDesc').value,
      image: document.getElementById('catImage').value,
      order: Number(document.getElementById('catOrder').value),
      isActive: document.getElementById('catActive').checked,
    };
    const url = isEdit ? API + '/categories/' + id : API + '/categories';
    const method = isEdit ? 'PUT' : 'POST';
    const r = await apiFetch(url, { method, body: JSON.stringify(body) });
    if (r.success) { closeModal(); toast(isEdit ? 'Category updated' : 'Category created'); loadSection('categories'); }
    else { toast(r.message || 'Error'); }
  });
}

async function deleteCategory(id, name) {
  if (!confirm('Delete category "' + name.replace(/&quot;/g, '"').replace(/&#39;/g, "'") + '"?')) return;
  const r = await apiFetch(API + '/categories/' + id, { method: 'DELETE' });
  if (r.success) { toast('Category deleted'); loadSection('categories'); }
  else { toast(r.message || 'Error'); }
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = document.getElementById('passwordInput').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  errEl.style.display = 'none';

  try {
    const r = await apiFetch(API + '/login', {
      method: 'POST',
      body: JSON.stringify({ password }),
    });
    if (r.success) {
      showView('app');
      loadSection(currentSection);
    } else {
      showView('404');
    }
  } catch {
    showView('404');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});

document.getElementById('signOutBtn').addEventListener('click', async () => {
  await apiFetch(API + '/logout', { method: 'POST' });
  showView('auth');
  document.getElementById('passwordInput').value = '';
  document.getElementById('passwordInput').focus();
});

document.getElementById('passwordInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('loginForm').dispatchEvent(new Event('submit'));
});

document.addEventListener('DOMContentLoaded', async () => {
  const s = window.location.pathname.split('/admin')[1]?.replace(/^\//, '') || 'dashboard';
  if (['dashboard', 'products', 'categories'].includes(s)) {
    document.querySelector(`.admin-nav-item[data-section="${s}"]`)?.classList.add('active');
    currentSection = s;
  }

  document.querySelectorAll('.admin-nav-item').forEach(el => {
    el.addEventListener('click', () => switchSection(el.dataset.section));
  });

  document.getElementById('mobileNav').addEventListener('change', function () {
    switchSection(this.value);
  });

  if (ADMIN_CONFIGURED !== 'true') {
    document.getElementById('adminAuth').innerHTML = `
      <div class="auth-card">
        <div class="auth-logo">SOLLENE</div>
        <p style="color:#dc2626;font-size:0.85rem">Configuration incomplete.</p>
        <p style="font-size:0.8rem;color:#666">Set ADMIN_PASSWORD in environment variables.</p>
      </div>`;
    return;
  }

  const r = await apiFetch(API + '/check');
  if (r.success) {
    showView('app');
    loadSection(currentSection);
  } else {
    showView('auth');
  }
});
</script>
<script src="/js/main.js"></script>
</body>
</html>
